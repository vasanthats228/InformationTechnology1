<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>404 · Page Not Found | Stackly IT</title>
  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8edf9 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    /* Animated Background Pattern - IT Themed */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(79, 70, 229, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(124, 58, 237, 0.04) 0%, transparent 50%),
        repeating-linear-gradient(45deg, rgba(79, 70, 229, 0.02) 0px, rgba(79, 70, 229, 0.02) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }

    /* Decorative IT Elements */
    body::after {
      content: '</>';
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 70px;
      font-weight: 800;
      opacity: 0.03;
      font-family: monospace;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 550px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(79, 70, 229, 0.15);
      animation: fadeSlideUp 0.6s ease-out;
      position: relative;
      z-index: 1;
    }

    .container:hover {
      box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.2);
      border-color: rgba(79, 70, 229, 0.25);
      transition: all 0.3s ease;
    }

    .four04 {
      font-size: 96px;
      font-weight: 800;
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: 4px;
      animation: softFloat 3s infinite ease-in-out;
      display: inline-block;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.2s;
    }

    p {
      font-size: 16px;
      color: #6c757d;
      margin-bottom: 32px;
      font-weight: 400;
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.3s;
    }

    /* Status Badge - IT Themed */
    .status-badge {
      display: inline-block;
      background: rgba(79, 70, 229, 0.1);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #4f46e5;
      margin-bottom: 20px;
      border: 1px solid rgba(79, 70, 229, 0.2);
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.15s;
    }

    .button-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.4s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
      min-width: 180px;
    }

    .btn i {
      font-size: 14px;
      transition: transform 0.2s ease;
    }

    .btn-home {
      background: #4f46e5;
    }

    .btn-home:hover {
      background: #6366f1;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.35);
    }

    .btn-home:hover i {
      transform: translateX(-4px);
    }

    .btn-prev {
      background: transparent;
      color: #4f46e5;
      border: 1px solid rgba(79, 70, 229, 0.4);
      box-shadow: none;
    }

    .btn-prev:hover {
      background: rgba(79, 70, 229, 0.05);
      transform: translateY(-3px);
      border-color: #4f46e5;
      color: #6366f1;
    }

    .btn-prev:hover i {
      transform: translateX(-4px);
    }

    /* Quick Links Section - Responsive */
    .quick-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.5s;
      flex-wrap: wrap;
    }

    .quick-link {
      color: #8b9cb0;
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .quick-link i {
      font-size: 0.75rem;
      color: #4f46e5;
    }

    .quick-link:hover {
      color: #4f46e5;
      transform: translateY(-2px);
    }

    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes softFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    /* Responsive Design - Extra Improvements */
    @media (max-width: 768px) {
      .container {
        padding: 2.5rem 2rem;
        max-width: 500px;
      }

      .four04 {
        font-size: 88px;
      }

      h2 {
        font-size: 26px;
      }

      p {
        font-size: 15px;
      }

      .btn {
        padding: 12px 24px;
        min-width: 160px;
        font-size: 14px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 2rem 1.5rem;
        max-width: 450px;
      }
      
      .button-group {
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      
      .btn {
        width: 100%;
        max-width: 260px;
        padding: 12px 20px;
        font-size: 14px;
      }

      .four04 {
        font-size: 72px;
        letter-spacing: 2px;
      }

      h2 {
        font-size: 22px;
        margin-bottom: 10px;
      }

      p {
        font-size: 14px;
        margin-bottom: 24px;
      }

      .quick-links {
        gap: 16px;
        margin-top: 20px;
        padding-top: 16px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .container {
        padding: 1.8rem 1.2rem;
        border-radius: 28px;
      }

      .four04 {
        font-size: 60px;
      }

      h2 {
        font-size: 20px;
      }

      p {
        font-size: 13px;
        margin-bottom: 20px;
      }

      .status-badge {
        font-size: 0.7rem;
        padding: 4px 12px;
        margin-bottom: 16px;
      }

      .btn {
        max-width: 100%;
        padding: 10px 18px;
        font-size: 13px;
      }

      .btn i {
        font-size: 12px;
      }

      .quick-link {
        font-size: 0.75rem;
      }

      .quick-link i {
        font-size: 0.7rem;
      }

      .quick-links {
        gap: 14px;
        margin-top: 18px;
        padding-top: 14px;
      }
    }

    @media (max-width: 380px) {
      .container {
        padding: 1.5rem 1rem;
      }

      .four04 {
        font-size: 52px;
      }

      h2 {
        font-size: 18px;
      }

      p {
        font-size: 12px;
        line-height: 1.5;
      }

      .btn {
        padding: 8px 16px;
        font-size: 12px;
      }

      .quick-link {
        font-size: 0.7rem;
      }
    }

    /* Landscape mode support */
    @media (max-height: 500px) and (orientation: landscape) {
      body {
        padding: 0.5rem;
      }

      .container {
        padding: 1.2rem 1.5rem;
        margin: 1rem 0;
      }

      .four04 {
        font-size: 48px;
        margin-bottom: 4px;
      }

      h2 {
        font-size: 18px;
        margin-bottom: 6px;
      }

      p {
        font-size: 12px;
        margin-bottom: 16px;
      }

      .status-badge {
        margin-bottom: 10px;
        padding: 3px 10px;
        font-size: 0.65rem;
      }

      .button-group {
        gap: 10px;
      }

      .btn {
        padding: 8px 16px;
        font-size: 12px;
      }

      .quick-links {
        margin-top: 12px;
        padding-top: 10px;
        gap: 12px;
      }
    }

    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }

    /* Custom scrollbar - IT Theme */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f0f4ff;
    }

    ::-webkit-scrollbar-thumb {
      background: #4f46e5;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6366f1;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Status Badge - IT Themed -->
    <div class="status-badge">
      <i class="fas fa-code-branch" style="margin-right: 6px;"></i> ROUTE NOT FOUND
    </div>
    
    <!-- 404 with Gradient -->
    <div class="four04">404</div>
    <h2>Page Not Found</h2>
    <p>The IT resource or page you're looking for doesn't exist or may have been moved. Let's get you back on track!</p>
    
    <div class="button-group">
      <a href="index.html" class="btn btn-home">
        <i class="fas fa-home"></i> Dashboard Home
      </a>
      
      <a href="javascript:history.back()" class="btn btn-prev">
        <i class="fas fa-arrow-left"></i> Go Back
      </a>
    </div>
    
    <!-- Quick Links -->
    <div class="quick-links">
      <a href="javascript:void(0)" onclick="showReport()" class="quick-link">
        <i class="fas fa-bug"></i> Report Issue
      </a>
      <a href="javascript:void(0)" onclick="window.location.reload()" class="quick-link">
        <i class="fas fa-sync-alt"></i> Retry Request
      </a>
    </div>
  </div>

  <script>
    function showReport() {
      alert('🔧 Report Technical Issue\n\nThank you for helping us improve Stackly IT!\n\nPage URL: ' + window.location.href + '\nTimestamp: ' + new Date().toLocaleString() + '\n\nOur IT team will investigate this issue.');
    }
    
    // Console message - IT Themed
    console.log('%c💻 Stackly IT Solutions | 404 Error', 'color: #4f46e5; font-size: 14px; font-weight: bold;');
    console.log('%cRequested resource not found. If this is a technical issue, please report it.', 'color: #6c757d; font-size: 12px;');
    
    // Keyboard shortcut: Alt + Left Arrow to go back
    document.addEventListener('keydown', function(e) {
      if (e.altKey && e.key === 'ArrowLeft') {
        e.preventDefault();
        window.history.back();
      }
    });

    // Track 404 page view
    console.log('404 Error tracked:', window.location.pathname);
  </script>
</body>
</html>
